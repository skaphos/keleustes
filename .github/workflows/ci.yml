#
# Keleustes CI workflow. Mirrors the local `task ci` job set so contributors
# can reproduce every check on their workstation; the Taskfile is the source
# of truth for tool versions and invocation. CI here is a thin wrapper.
#
# Security note: every shell step that consumes a workflow context value
# passes it via env: rather than direct ${{ ... }} interpolation. The only
# context values we touch are github.base_ref (a defended branch name) and
# needs.<job>.result (an enum string from GitHub's job result codes); both
# are safe but we use the env-var pattern uniformly anyway.
#
# Action pinning: every action — first-party (actions/*) and third-party — is
# pinned to a full commit SHA with a "# vX.Y.Z" comment for supply-chain
# integrity. Bump deliberately; Dependabot keeps the SHA + comment current.

name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  dco:
    name: DCO
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Verify Signed-off-by on PR commits
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -Eeuo pipefail
          git fetch --no-tags --prune origin "${BASE_REF}:${BASE_REF}"
          missing=0
          while IFS= read -r commit; do
            [ -z "$commit" ] && continue
            if ! git log -1 --pretty=%B "$commit" | grep -qiE '^Signed-off-by: '; then
              echo "Missing Signed-off-by trailer: $commit"
              missing=1
            fi
          done < <(git rev-list --no-merges "origin/${BASE_REF}..HEAD")
          [ "$missing" -eq 0 ] || { echo "DCO check failed. Rebase/amend with: git commit --signoff"; exit 1; }

  reuse:
    name: REUSE lint
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install pipx
        run: sudo apt-get update && sudo apt-get install -y pipx
      - name: REUSE lint
        # Pin to a known-good REUSE version so a new upstream release
        # cannot break CI behind our backs. Bump deliberately.
        run: pipx run --spec 'reuse==6.2.0' reuse lint

  lint:
    name: Lint + generation drift
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.sum
            tools/go.sum
      - name: Run linter (regenerates manifests + deepcopy + golangci-lint)
        run: go -C tools tool task -d .. lint
      - name: Normalize generated imports
        # `task lint` runs controller-gen but not goimports; fresh deepcopy
        # output uses unnamed `meta/v1` imports, which goimports renames to
        # the package-default `v1` alias. Run fmt before the drift check so
        # the diff reflects "what a contributor running `task fmt` after
        # generation would see," not raw controller-gen output.
        run: go -C tools tool task -d .. fmt
      - name: Check controller-gen output for drift
        run: |
          set -Eeuo pipefail
          if ! git diff --quiet -- config/crd/bases/ config/rbac/ api/v1alpha1/zz_generated.deepcopy.go; then
            echo "::error::controller-gen output drifted. Run 'go -C tools tool task lint && go -C tools tool task fmt' locally and commit the result."
            git --no-pager diff -- config/crd/bases/ config/rbac/ api/v1alpha1/zz_generated.deepcopy.go
            exit 1
          fi

  staticcheck:
    name: Staticcheck
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.sum
            tools/go.sum
      - name: Staticcheck
        run: go -C tools tool task -d .. staticcheck

  test:
    name: Test (envtest)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.sum
            tools/go.sum
      - name: Test
        run: go -C tools tool task -d .. test
      - name: Upload coverage (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: error
          retention-days: 14

  vuln:
    name: govulncheck
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    # Blocking. `task vuln` runs govulncheck through hack/vuln/check.sh, which
    # fails on any affecting vulnerability that is NOT in hack/vuln/allow.txt.
    # The allowlist currently waives the two unfixable, unreachable
    # k8s.io/kubernetes advisories (GO-2025-3547, GO-2025-3521) the fork links
    # via scheme registration — each documented there with rationale.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.sum
            tools/go.sum
      - name: Vulnerability scan
        run: go -C tools tool task -d .. vuln

  licenses:
    name: Licenses freshness
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.sum
            tools/go.sum
      - name: THIRD_PARTY_LICENSES freshness check
        run: go -C tools tool task -d .. licenses:check

  build:
    name: Build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.sum
            tools/go.sum
      - name: Build manager
        run: go -C tools tool task -d .. build
      - name: Build keleustesctl
        run: go -C tools tool task -d .. build-ctl

  ui:
    name: UI (lint · test · build · e2e)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11
      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Generate API client
        run: pnpm gen:api
      - name: Lint
        run: pnpm lint
      - name: Type-check
        run: pnpm typecheck
      - name: Unit + component tests
        run: pnpm test
      - name: Build
        run: pnpm build
      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium
      - name: End-to-end (Playwright)
        run: pnpm e2e

  summary:
    name: CI summary
    needs: [reuse, lint, staticcheck, test, vuln, licenses, build, ui]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Publish summary
        env:
          REUSE_RESULT: ${{ needs.reuse.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          STATICCHECK_RESULT: ${{ needs.staticcheck.result }}
          TEST_RESULT: ${{ needs.test.result }}
          VULN_RESULT: ${{ needs.vuln.result }}
          LICENSES_RESULT: ${{ needs.licenses.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          UI_RESULT: ${{ needs.ui.result }}
        run: |
          {
            echo "## CI Summary"
            echo
            echo "| Job | Result |"
            echo "| --- | --- |"
            echo "| reuse | ${REUSE_RESULT} |"
            echo "| lint | ${LINT_RESULT} |"
            echo "| staticcheck | ${STATICCHECK_RESULT} |"
            echo "| test | ${TEST_RESULT} |"
            echo "| vuln | ${VULN_RESULT} |"
            echo "| licenses | ${LICENSES_RESULT} |"
            echo "| build | ${BUILD_RESULT} |"
            echo "| ui | ${UI_RESULT} |"
          } >> "$GITHUB_STEP_SUMMARY"
