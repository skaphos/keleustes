version: "3"

vars:
  TASK_RUNNER: go -C tools tool task -d ..
  CONTROLLER_GEN: go run sigs.k8s.io/controller-tools/cmd/controller-gen@v0.21.0
  KUSTOMIZE: go run sigs.k8s.io/kustomize/kustomize/v5@v5.8.1
  SETUP_ENVTEST: go run sigs.k8s.io/controller-runtime/tools/setup-envtest@v0.24.1
  GOLANGCI_RUNNER: go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
  GOIMPORTS_RUNNER: go run golang.org/x/tools/cmd/goimports@v0.47.0
  STATICCHECK_RUNNER: go run honnef.co/go/tools/cmd/staticcheck@v0.7.0
  GOVULNCHECK_RUNNER: go run golang.org/x/vuln/cmd/govulncheck@v1.5.0
  PNPM: pnpm
  ENVTEST_K8S_VERSION: "1.33"
  IMG: '{{.IMG | default "controller:latest"}}'
  CTL_IMG: '{{.CTL_IMG | default "keleustesctl:latest"}}'
  VERSION: '{{.VERSION | default "0.0.1"}}'
  IMAGE_TAG_BASE: '{{.IMAGE_TAG_BASE | default "skaphos.io/keleustes"}}'
  BUNDLE_IMG: '{{.BUNDLE_IMG | default (printf "%s-bundle:v%s" .IMAGE_TAG_BASE .VERSION)}}'
  CATALOG_IMG: '{{.CATALOG_IMG | default (printf "%s-catalog:v%s" .IMAGE_TAG_BASE .VERSION)}}'
  KIND_CLUSTER: '{{.KIND_CLUSTER | default "keleustes-test-e2e"}}'

tasks:
  default:
    desc: List available tasks
    cmds:
      - '{{.TASK_RUNNER}} --list'

  list:
    desc: List available tasks
    cmds:
      - '{{.TASK_RUNNER}} --list'

  # --- Codegen ---

  manifests:
    desc: Generate CRDs, RBAC, and webhook manifests via controller-gen
    cmds:
      - '{{.CONTROLLER_GEN}} rbac:roleName=manager-role crd webhook paths="./..." output:crd:artifacts:config=config/crd/bases'

  generate:
    desc: Generate DeepCopy implementations via controller-gen
    cmds:
      - '{{.CONTROLLER_GEN}} object:headerFile="hack/boilerplate.go.txt" paths="./..."'

  # --- Quality ---

  fmt:
    desc: Format code
    cmds:
      - '{{.GOIMPORTS_RUNNER}} -w .'
      - go fmt ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  lint:
    desc: Run golangci-lint + PrometheusRule runbook check
    cmds:
      - task: manifests
      - task: generate
      # fmt before lint so goimports normalizes controller-gen's output
      # (unnamed `meta/v1` import → aliased `v1`). Keeps the drift check
      # in .github/workflows/ci.yml accurate when contributors run
      # `task lint` locally.
      - task: fmt
      - '{{.GOLANGCI_RUNNER}} run ./...'
      - task: lint:prometheusrules

  lint-fix:
    desc: Run golangci-lint with --fix
    cmds:
      - '{{.GOLANGCI_RUNNER}} run --fix ./...'

  lint:prometheusrules:
    desc: Fail if any PrometheusRule alert is missing a runbook annotation
    cmds:
      - bash hack/lint/prometheusrules.sh

  staticcheck:
    desc: Run staticcheck
    cmds:
      - '{{.STATICCHECK_RUNNER}} ./...'

  vuln:
    desc: Run vulnerability scan (govulncheck + reviewed allowlist in hack/vuln/allow.txt)
    cmds:
      - GOVULNCHECK='{{.GOVULNCHECK_RUNNER}}' bash hack/vuln/check.sh

  # --- License attribution ---

  licenses:
    desc: Regenerate THIRD_PARTY_LICENSES.md from the current Go module graph
    cmds:
      - bash hack/licenses/generate.sh

  licenses:check:
    desc: Fail if THIRD_PARTY_LICENSES.md is stale relative to current deps
    cmds:
      - task: licenses
      - |
        if ! git diff --quiet -- THIRD_PARTY_LICENSES.md; then
          echo "THIRD_PARTY_LICENSES.md is out of date — run 'go -C tools tool task licenses' and commit the result." >&2
          git diff -- THIRD_PARTY_LICENSES.md >&2
          exit 1
        fi

  # --- Tests ---

  test:
    desc: Run unit tests against envtest
    cmds:
      - task: manifests
      - task: generate
      - task: fmt
      - task: vet
      - |
        set -euo pipefail
        ASSETS="$({{.SETUP_ENVTEST}} use {{.ENVTEST_K8S_VERSION}} -p path)"
        KUBEBUILDER_ASSETS="$ASSETS" go test $(go list ./... | grep -v /e2e) -coverprofile=coverage.out

  test-e2e:
    desc: Run e2e tests against a Kind cluster (requires kind + docker)
    cmds:
      - task: manifests
      - task: generate
      - task: fmt
      - task: vet
      - |
        set -euo pipefail
        command -v kind >/dev/null 2>&1 || { echo "kind not found in PATH" >&2; exit 1; }
        if ! kind get clusters | grep -q "^{{.KIND_CLUSTER}}$"; then
          kind create cluster --name {{.KIND_CLUSTER}}
        fi
        KIND_CLUSTER={{.KIND_CLUSTER}} go test ./test/e2e/ -v -ginkgo.v
        kind delete cluster --name {{.KIND_CLUSTER}}

  # --- Build ---

  build:
    desc: Build manager binary
    cmds:
      - task: manifests
      - task: generate
      - task: fmt
      - task: vet
      - go build -o bin/manager ./cmd/manager

  build-ctl:
    desc: Build keleustesctl binary
    cmds:
      - go build -o bin/keleustesctl ./cmd/keleustesctl

  run:
    desc: Run the controller from your host
    cmds:
      - task: manifests
      - task: generate
      - task: fmt
      - task: vet
      - go run ./cmd/manager

  docker-build:
    desc: Build controller container image (IMG={{.IMG}})
    cmds:
      - docker build -t {{.IMG}} .

  docker-build-ctl:
    desc: Build keleustesctl container image (CTL_IMG={{.CTL_IMG}})
    cmds:
      - docker build -f Dockerfile.keleustesctl -t {{.CTL_IMG}} .

  docker-push:
    desc: Push controller container image (IMG={{.IMG}})
    cmds:
      - docker push {{.IMG}}

  build-installer:
    desc: Render consolidated install.yaml under dist/
    cmds:
      - task: manifests
      - task: generate
      - mkdir -p dist
      - (cd config/manager && {{.KUSTOMIZE}} edit set image controller={{.IMG}})
      - '{{.KUSTOMIZE}} build config/default > dist/install.yaml'

  # --- Cluster lifecycle ---

  install:
    desc: Install CRDs into the current cluster
    cmds:
      - task: manifests
      - '{{.KUSTOMIZE}} build config/crd | kubectl apply -f -'

  uninstall:
    desc: Remove CRDs from the current cluster
    cmds:
      - task: manifests
      - '{{.KUSTOMIZE}} build config/crd | kubectl delete --ignore-not-found=true -f -'

  deploy:
    desc: Deploy the operator to the current cluster
    cmds:
      - task: manifests
      - (cd config/manager && {{.KUSTOMIZE}} edit set image controller={{.IMG}})
      - '{{.KUSTOMIZE}} build config/default | kubectl apply -f -'

  undeploy:
    desc: Undeploy the operator from the current cluster
    cmds:
      - '{{.KUSTOMIZE}} build config/default | kubectl delete --ignore-not-found=true -f -'

  # --- UI ---
  # The web UI lives in ui/ (Vite + React + TS). Tasks shell out to pnpm; the
  # typed API client is generated from openapi/keleustes.v1.yaml, so anything
  # that type-checks depends on ui:gen. See ui/README.md.

  ui:install:
    desc: Install UI dependencies (pnpm)
    dir: ui
    cmds:
      - '{{.PNPM}} install'

  ui:gen:
    desc: Regenerate the typed API client from openapi/keleustes.v1.yaml
    dir: ui
    cmds:
      - '{{.PNPM}} gen:api'

  ui:dev:
    desc: Run the UI dev server (Vite + MSW fixtures) for usability testing
    dir: ui
    cmds:
      - '{{.PNPM}} dev'

  ui:typecheck:
    desc: Type-check the UI
    dir: ui
    deps: [ui:gen]
    cmds:
      - '{{.PNPM}} typecheck'

  ui:lint:
    desc: Lint + type-check the UI
    dir: ui
    deps: [ui:gen]
    cmds:
      - '{{.PNPM}} lint'
      - '{{.PNPM}} typecheck'

  ui:test:
    desc: Run UI unit + component tests (Vitest + MSW)
    dir: ui
    deps: [ui:gen]
    cmds:
      - '{{.PNPM}} test'

  ui:build:
    desc: Production build of the UI
    dir: ui
    deps: [ui:gen]
    cmds:
      - '{{.PNPM}} build'

  ui:e2e:
    desc: Run UI end-to-end tests (Playwright; boots the dev server)
    dir: ui
    deps: [ui:gen]
    cmds:
      - '{{.PNPM}} e2e'

  ui:ci:
    desc: Full UI CI — install, gen, lint, typecheck, test, build
    dir: ui
    cmds:
      - '{{.PNPM}} install'
      - '{{.PNPM}} gen:api'
      - '{{.PNPM}} lint'
      - '{{.PNPM}} typecheck'
      - '{{.PNPM}} test'
      - '{{.PNPM}} build'

  # --- Housekeeping ---

  clean:
    desc: Remove build outputs and test caches
    cmds:
      - go clean ./...
      - go clean -testcache
      - rm -rf bin dist coverage.out

  ci:
    desc: Run standard CI workflow locally
    cmds:
      - task: lint
      - task: test
      - task: staticcheck
      - task: vuln
      - task: licenses:check
      - task: build
      - task: build-ctl
