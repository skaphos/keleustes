#
# Cluster-internal Service for the Keleustes controller-manager. The
# `metrics` port is what Prometheus scrapes via the ServiceMonitor in
# config/observability/prometheus/. The `healthz` port is kept for
# in-cluster clients that want to query liveness without targeting a
# specific pod IP — kubelet's own liveness/readiness probes target the
# pod directly, not this Service.
#
# Per docs/plans/2026-05-distributed-runtime-architecture.md §7.5 these
# endpoints stay cluster-internal — no Gateway listener, no external
# exposure — so a plain ClusterIP Service is the right shape.
#
# The `keleustes.skaphos.io/scrape-job` label is referenced by the
# ServiceMonitor's `jobLabel` so the scraped time series carry
# `job="controller-manager-metrics"` (the value of this label),
# independent of the kustomize-prefixed Service name. Queries in
# PrometheusRule + dashboard use that literal job value.

apiVersion: v1
kind: Service
metadata:
  name: controller-manager-metrics
  namespace: skaphos-keleustes-system
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: keleustes
    app.kubernetes.io/component: manager
    app.kubernetes.io/managed-by: kustomize
    # Drives `job=` on scraped metrics; do not rename without updating
    # PrometheusRule + dashboard queries (and README).
    keleustes.skaphos.io/scrape-job: controller-manager-metrics
spec:
  type: ClusterIP
  selector:
    control-plane: controller-manager
    app.kubernetes.io/name: keleustes
  ports:
    - name: metrics
      port: 8080
      targetPort: metrics
      protocol: TCP
    - name: healthz
      port: 8081
      targetPort: healthz
      protocol: TCP
