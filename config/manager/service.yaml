#
# Cluster-internal Service for the Keleustes controller-manager. Exposes the
# named `metrics` and `healthz` ports so in-cluster scrapers (Prometheus,
# kubelet probes) can target the manager by Service DNS rather than pod IP.
# Per docs/plans/2026-05-distributed-runtime-architecture.md §7.5 these
# endpoints stay cluster-internal — no Gateway listener, no external
# exposure — so a plain ClusterIP Service is the right shape.

apiVersion: v1
kind: Service
metadata:
  name: controller-manager-metrics
  namespace: skaphos-keleustes-system
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: keleustes
    app.kubernetes.io/component: manager
    app.kubernetes.io/managed-by: kustomize
spec:
  type: ClusterIP
  selector:
    control-plane: controller-manager
    app.kubernetes.io/name: keleustes
  ports:
    - name: metrics
      port: 8080
      targetPort: metrics
      protocol: TCP
    - name: healthz
      port: 8081
      targetPort: healthz
      protocol: TCP
