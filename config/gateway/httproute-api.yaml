#
# Routes /api/* on the internal Gateway to the future `keleustes-api` Service.
# The Service does not exist in MVP 0 — the API server lands in MVP 1+
# alongside the first engines. Until then the HTTPRoute will report
# ResolvedRefs=False on its parent Gateway; that's expected and intentional
# (it's an attached-but-unfulfilled route, not a config error).
#
# Health and metrics endpoints stay cluster-internal per runtime plan §7.5 row
# "Cluster-internal observability" — they are scraped by a same-cluster
# Prometheus and never routed through this Gateway.

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: keleustes-api
  namespace: skaphos-keleustes-system
  labels:
    app.kubernetes.io/part-of: keleustes
    app.kubernetes.io/managed-by: kustomize
spec:
  parentRefs:
    - name: keleustes-internal
      sectionName: https
  hostnames:
    - keleustes.example.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: keleustes-api
          port: 8443
