#
# Scrape the controller-manager's /metrics endpoint via the Service shipped
# in config/manager/service.yaml. Per docs/plans/2026-05-observability-stack.md
# §4.1. The `release: prometheus` label is the convention Prometheus Operator
# uses to discover ServiceMonitors; customers override via kustomize patch
# if their Prometheus instance selects on a different label.

apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: keleustes-manager
  namespace: skaphos-keleustes-system
  labels:
    app.kubernetes.io/part-of: keleustes
    app.kubernetes.io/component: manager
    app.kubernetes.io/managed-by: kustomize
    release: prometheus
spec:
  namespaceSelector:
    matchNames: [skaphos-keleustes-system]
  selector:
    matchLabels:
      app.kubernetes.io/name: keleustes
      app.kubernetes.io/component: manager
  endpoints:
    - port: metrics
      interval: 30s
      scrapeTimeout: 10s
      honorLabels: false
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_node_name]
          targetLabel: node
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace
      metricRelabelings:
        # Drop high-cardinality go runtime metrics that don't aid operability.
        # Customers re-enable selectively via kustomize patch if they want them.
        - sourceLabels: [__name__]
          regex: 'go_gc_duration_seconds.*|go_memstats_(alloc|frees|sys|heap_(alloc|sys|idle|inuse|released))_.*'
          action: keep
        - sourceLabels: [__name__]
          regex: 'go_.*'
          action: drop
