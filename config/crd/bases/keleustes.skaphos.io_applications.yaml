---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: applications.keleustes.skaphos.io
spec:
  group: keleustes.skaphos.io
  names:
    kind: Application
    listKind: ApplicationList
    plural: applications
    singular: application
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.deployment.strategy
      name: Strategy
      type: string
    - jsonPath: .spec.deployment.manifest.type
      name: Manifest
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Application is the central delivery abstraction in Keleustes.
          See PROPOSAL §8.1.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ApplicationSpec defines the desired state of Application.
            properties:
              deployment:
                description: Deployment configures how the application is reconciled
                  into clusters.
                properties:
                  manifest:
                    description: Manifest configures the renderer that produces desired-state
                      manifests.
                    properties:
                      basePath:
                        description: |-
                          BasePath is the path inside Repo containing the manifest root. For
                          Helm this is the chart directory; for Kustomize the kustomization
                          directory; for raw the directory of manifests.
                        maxLength: 1024
                        type: string
                      chart:
                        description: Chart names an OCI or Helm chart reference when
                          Type is helm.
                        maxLength: 512
                        type: string
                      repo:
                        description: |-
                          Repo is the Git repository URL (e.g., github.com/example/platform-state)
                          from which manifests are read. Required when Type is kustomize or raw.
                        maxLength: 2048
                        type: string
                      type:
                        description: Type is the manifest renderer.
                        enum:
                        - kustomize
                        - helm
                        - raw
                        type: string
                    required:
                    - type
                    type: object
                  strategy:
                    default: gitops
                    description: |-
                      Strategy selects how manifests are reconciled. gitops is the default and
                      only fully supported strategy in MVP 0 and 1.
                    enum:
                    - gitops
                    - directApply
                    type: string
                required:
                - manifest
                - strategy
                type: object
              owner:
                description: Owner describes the responsible team. Used by the UI
                  and audit trails.
                properties:
                  contact:
                    description: |-
                      Contact is a human-readable contact channel (e.g., Slack channel,
                      email distribution list).
                    maxLength: 253
                    type: string
                  team:
                    description: Team is the owning team identifier.
                    maxLength: 253
                    type: string
                type: object
              sourceRefs:
                description: SourceRefs are Source resources this Application consumes.
                items:
                  description: LocalObjectReference references an object in the same
                    namespace by name.
                  properties:
                    name:
                      description: Name of the referenced object.
                      maxLength: 253
                      minLength: 1
                      type: string
                  required:
                  - name
                  type: object
                type: array
              topology:
                description: Topology declares the application's intended environment
                  scope.
                properties:
                  environments:
                    description: |-
                      Environments lists the names of Environment resources this application
                      targets, in promotion order.
                    items:
                      type: string
                    type: array
                type: object
            required:
            - deployment
            type: object
          status:
            description: ApplicationStatus defines the observed state of Application.
            properties:
              conditions:
                description: Conditions summarize the controller's view of the Application.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: ObservedGeneration is the most recent metadata.generation
                  reconciled.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
