---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: notifiers.keleustes.skaphos.io
spec:
  group: keleustes.skaphos.io
  names:
    kind: Notifier
    listKind: NotifierList
    plural: notifiers
    singular: notifier
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.endpoint.builtin
      name: Endpoint
      type: string
    - jsonPath: .spec.delivery.mode
      name: Mode
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Notifier routes Keleustes lifecycle events to external sinks. See
          docs/plans/2026-05-extensibility-plugin-surfaces.md §3.1 and ADR 0001
          (plugin extension model).
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              NotifierSpec defines the desired state of a Notifier. See
              docs/plans/2026-05-extensibility-plugin-surfaces.md §3.1.

              Notifiers route lifecycle events to external sinks. Delivery is async
              and fail-open per plan §3.1 — a broken sink never blocks a Promotion
              or a SyncRun.
            properties:
              delivery:
                description: |-
                  Delivery controls how the Notifier delivers messages. Defaults
                  chosen to match plan §3.1 ("always async, fail-open").
                properties:
                  backoff:
                    default: exponential
                    description: Backoff selects the retry-interval strategy.
                    enum:
                    - constant
                    - exponential
                    type: string
                  mode:
                    default: async
                    description: |-
                      Mode controls whether delivery is asynchronous (default) or
                      synchronous. Notifiers remain fail-open in either mode.
                    enum:
                    - async
                    - sync
                    type: string
                  retries:
                    default: 3
                    description: |-
                      Retries is the maximum number of additional attempts after a
                      failed delivery. Zero disables retries.
                    format: int32
                    maximum: 10
                    minimum: 0
                    type: integer
                  timeout:
                    description: Timeout for a single delivery attempt.
                    type: string
                type: object
              endpoint:
                description: |-
                  Endpoint is the delivery target. Exactly one of Builtin or Webhook
                  must be set; the CEL rule on NotifierEndpoint enforces the XOR.
                properties:
                  builtin:
                    description: |-
                      Builtin selects a Skaphos-provided notifier implementation.
                      MVP 1 lands the first built-in (`webhook`); the others appear as
                      their implementations ship per the extensibility plan's phased
                      rollout (§11).
                    enum:
                    - stdout
                    - k8sEvent
                    - slack
                    - pagerduty
                    - msteams
                    type: string
                  webhook:
                    description: Webhook delivers via HTTP POST to a customer-managed
                      receiver.
                    properties:
                      authSecretRef:
                        description: |-
                          AuthSecretRef points at a Secret carrying a bearer token, shared
                          HMAC key, or other auth material the receiver will validate.
                        properties:
                          key:
                            description: Key inside the Secret. When empty the consumer
                              chooses a sensible default.
                            maxLength: 253
                            type: string
                          name:
                            description: Name of the Secret.
                            maxLength: 253
                            minLength: 1
                            type: string
                        required:
                        - name
                        type: object
                      url:
                        description: |-
                          URL is the HTTPS endpoint receiving the notification. Plaintext
                          HTTP is rejected to keep authSecretRef tokens off the wire.
                        maxLength: 2048
                        pattern: ^https://
                        type: string
                    required:
                    - url
                    type: object
                type: object
                x-kubernetes-validations:
                - message: exactly one of endpoint.builtin or endpoint.webhook must
                    be set
                  rule: (has(self.builtin) && !has(self.webhook)) || (!has(self.builtin)
                    && has(self.webhook))
              events:
                description: |-
                  Events selects which event classes this Notifier receives. An empty
                  Include matches every event class; Exclude is applied after Include.
                  Event-class names follow the audit-event-schema §13 registry
                  (e.g. "Promotion.Blocked", "SyncRun.Failed").
                properties:
                  exclude:
                    description: |-
                      Exclude lists event class names that should never be delivered,
                      applied after Include resolution.
                    items:
                      type: string
                    type: array
                    x-kubernetes-list-type: set
                  include:
                    description: |-
                      Include lists event class names that should be delivered. An empty
                      list matches every class. Entries are matched literally
                      (e.g. "Promotion.Blocked", "SyncRun.Failed").
                    items:
                      type: string
                    type: array
                    x-kubernetes-list-type: set
                type: object
              filters:
                description: Filters narrow matched events by resource attributes.
                properties:
                  applications:
                    description: |-
                      Applications restricts deliveries to events whose subject
                      Application name matches one of the glob patterns.
                    items:
                      type: string
                    type: array
                    x-kubernetes-list-type: set
                  environments:
                    description: |-
                      Environments restricts deliveries to events whose subject's
                      Environment label is in the list.
                    items:
                      type: string
                    type: array
                    x-kubernetes-list-type: set
                type: object
            required:
            - endpoint
            type: object
          status:
            description: NotifierStatus defines the observed state of Notifier.
            properties:
              conditions:
                description: |-
                  Conditions summarize the controller's view of this Notifier. The
                  `Accepted` condition reflects schema acceptance; delivery health
                  surfaces under `Ready` once MVP 1 lands the dispatcher.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: |-
                  ObservedGeneration is the most recent metadata.generation
                  reconciled.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
