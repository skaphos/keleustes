---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: releases.keleustes.skaphos.io
spec:
  group: keleustes.skaphos.io
  names:
    kind: Release
    listKind: ReleaseList
    plural: releases
    singular: release
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.application
      name: Application
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Release is a deployable collection of pinned artifacts for an Application.
          See PROPOSAL §8.6.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ReleaseSpec defines the desired state of Release.
            properties:
              application:
                description: Application names the Application this Release is for.
                maxLength: 253
                minLength: 1
                type: string
              artifacts:
                description: Artifacts pins the deployable artifacts that make up
                  the Release.
                items:
                  description: ReleaseArtifact is a single pinned artifact making
                    up a Release.
                  properties:
                    digest:
                      description: Digest is the immutable content addressable identifier
                        (e.g., sha256:...).
                      maxLength: 255
                      type: string
                    ref:
                      description: Ref is the artifact reference (e.g., a container
                        image ref or chart URL).
                      maxLength: 2048
                      minLength: 1
                      type: string
                    type:
                      description: Type of the artifact.
                      enum:
                      - image
                      - chart
                      - ociArtifact
                      type: string
                    version:
                      description: |-
                        Version is the human-readable version of this artifact (e.g., a chart
                        semver or image tag) for UI display.
                      maxLength: 255
                      type: string
                  required:
                  - ref
                  - type
                  type: object
                minItems: 1
                type: array
              provenance:
                description: Provenance records how the Release was produced.
                properties:
                  buildUrl:
                    description: BuildURL points at the CI build that produced the
                      Release.
                    maxLength: 2048
                    type: string
                  commit:
                    description: Commit is the source commit SHA used to produce the
                      artifacts.
                    maxLength: 128
                    type: string
                  sbomRef:
                    description: SBOMRef references the SBOM artifact associated with
                      the Release.
                    maxLength: 2048
                    type: string
                type: object
            required:
            - application
            - artifacts
            type: object
          status:
            description: ReleaseStatus defines the observed state of Release.
            properties:
              conditions:
                description: Conditions summarize the controller's view of the Release.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: ObservedGeneration is the most recent metadata.generation
                  reconciled.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
