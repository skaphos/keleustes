---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: promotions.keleustes.skaphos.io
spec:
  group: keleustes.skaphos.io
  names:
    kind: Promotion
    listKind: PromotionList
    plural: promotions
    singular: promotion
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.application
      name: Application
      type: string
    - jsonPath: .spec.release
      name: Release
      type: string
    - jsonPath: .spec.to.environment
      name: To
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Promotion is a requested movement of a Release into one or more deployment
          targets. See PROPOSAL §8.7.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: PromotionSpec defines the desired state of Promotion.
            properties:
              application:
                description: Application names the Application being promoted.
                maxLength: 253
                minLength: 1
                type: string
              change:
                description: Change is an optional external change-management reference.
                properties:
                  id:
                    description: ID is the provider-local change identifier.
                    maxLength: 253
                    type: string
                  provider:
                    description: Provider names the change-management system (e.g.,
                      servicenow, jira).
                    maxLength: 253
                    type: string
                type: object
              from:
                description: From is the source of the promotion.
                properties:
                  environment:
                    description: Environment is the source Environment name.
                    maxLength: 253
                    minLength: 1
                    type: string
                required:
                - environment
                type: object
              mode:
                default: pullRequest
                description: Mode controls how Keleustes mutates Git or cluster state
                  to enact the promotion.
                enum:
                - directCommit
                - pullRequest
                - manualRecordOnly
                - dryRun
                type: string
              policyRefs:
                description: |-
                  PolicyRefs names PromotionPolicy resources that must pass before the
                  Promotion can proceed.
                items:
                  description: LocalObjectReference references an object in the same
                    namespace by name.
                  properties:
                    name:
                      description: Name of the referenced object.
                      maxLength: 253
                      minLength: 1
                      type: string
                  required:
                  - name
                  type: object
                type: array
              release:
                description: Release names the Release being promoted.
                maxLength: 253
                minLength: 1
                type: string
              to:
                description: To is the destination of the promotion.
                properties:
                  cells:
                    description: Cells optionally restricts the promotion to the listed
                      Cells.
                    items:
                      type: string
                    type: array
                  environment:
                    description: Environment is the destination Environment name.
                    maxLength: 253
                    minLength: 1
                    type: string
                  regions:
                    description: Regions optionally restricts the promotion to the
                      listed regions.
                    items:
                      type: string
                    type: array
                required:
                - environment
                type: object
            required:
            - application
            - from
            - mode
            - release
            - to
            type: object
          status:
            description: PromotionStatus defines the observed state of Promotion.
            properties:
              blockers:
                description: Blockers is a list of human-readable reasons the promotion
                  is not advancing.
                items:
                  type: string
                type: array
              conditions:
                description: Conditions summarize the controller's view of the Promotion.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: ObservedGeneration is the most recent metadata.generation
                  reconciled.
                format: int64
                type: integer
              phase:
                description: Phase is the current Promotion lifecycle phase.
                enum:
                - Proposed
                - Evaluating
                - Blocked
                - Approved
                - MutatingGit
                - WaitingForMerge
                - WaitingForSync
                - Verifying
                - Succeeded
                - Failed
                - RolledBack
                - Canceled
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
